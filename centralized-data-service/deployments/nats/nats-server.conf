# NATS Server Configuration with ACL
# CDC Integration - v1.12

jetstream {}

# Monitoring
http_port: 8222

# Authorization
authorization {
  users = [
    # CDC Worker: full access CDC + JetStream + ACK
    {
      user: cdc_worker
      password: worker_secret_2026
      permissions: {
        publish: [
          "cdc.>",
          "schema.>",
          "$JS.API.>",
          "$JS.ACK.>"
        ]
        subscribe: [
          "cdc.>",
          "schema.>",
          "$JS.API.>",
          "$JS.ACK.>",
          "_INBOX.>"
        ]
      }
    }

    # CMS Service: commands + JetStream API
    {
      user: cms_service
      password: cms_secret_2026
      permissions: {
        publish: [
          "cdc.>",
          "schema.config.reload",
          "$JS.API.>"
        ]
        subscribe: [
          "cdc.>",
          "schema.config.reload",
          "$JS.API.>",
          "_INBOX.>"
        ]
      }
    }

    # Debezium Server: publish CDC events + JetStream API
    {
      user: debezium
      password: debezium_secret_2026
      permissions: {
        publish: [
          "cdc.>",
          "$JS.API.>"
        ]
        subscribe: [
          "cdc.>",
          "$JS.API.>",
          "_INBOX.>"
        ]
      }
    }

    # Auth Service: minimal access
    {
      user: auth_service
      password: auth_secret_2026
      permissions: {
        publish: []
        subscribe: []
      }
    }
  ]
}
