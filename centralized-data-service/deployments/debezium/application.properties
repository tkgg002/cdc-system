# Debezium Server Configuration — NATS Sink (no Kafka needed)

# Sink: NATS JetStream
debezium.sink.type=nats-jetstream
debezium.sink.nats-jetstream.url=nats://debezium:debezium_secret_2026@nats:4222
debezium.sink.nats-jetstream.create-stream=false

# Source: MongoDB
debezium.source.connector.class=io.debezium.connector.mongodb.MongoDbConnector
debezium.source.mongodb.connection.string=mongodb://mongodb:27017/?replicaSet=rs0
debezium.source.topic.prefix=cdc.goopay
debezium.source.database.include.list=payment-bill-service
debezium.source.capture.mode=change_streams_update_full
debezium.source.mongodb.poll.interval.ms=1000
debezium.source.snapshot.mode=initial

# No transforms — NATS subject = topic.prefix.db.collection (auto from Debezium)
# Format: JSON without schemas
debezium.format.key=json
debezium.format.value=json
debezium.format.key.schemas.enable=false
debezium.format.value.schemas.enable=false

# Offset storage (file-based for simplicity)
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=10000

# Schema history (file-based)
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/schema-history.dat
