services:
  # 1. Source: MySQL (Bật Binlog cho Debezium sau này)
  mysql:
    image: mysql:8.0
    container_name: gpay-mysql
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: goopay_db
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cdc-network

  # 2. Source: MongoDB (Bật ReplicaSet để có Oplog)
  mongodb:
    image: mongo:6.0
    container_name: gpay-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "17017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cdc-network
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate() }" | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Message Broker: NATS JetStream
  nats:
    image: nats:2.9-alpine
    container_name: gpay-nats
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "14222:4222"   # Client port
      - "18222:8222"   # Monitoring port (HTTP)
    volumes:
      - ./deployments/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    networks:
      - cdc-network

  # 4. Target Sink: PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: gpay-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: goopay_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cdc-network

  # 5. Cache: Redis (Schema Inspector cache + mapping rules)
  redis:
    image: redis:7-alpine
    container_name: gpay-redis
    ports:
      - "16379:6379"
    networks:
      - cdc-network


  # 7. CDC Worker Service (Go)
  cdc-worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.worker
    container_name: gpay-cdc-worker
    depends_on:
      - nats
      - postgres
      - redis
    environment:
      - NATS_URL=nats://cdc_worker:worker_secret_2026@nats:4222
      - DB_SINK_URL=postgres://user:password@postgres:5432/goopay_dw?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - BATCH_SIZE=500
      - BATCH_TIMEOUT=2s
      - WORKER_POOL_SIZE=10
    networks:
      - cdc-network

  # 8. Kafka (KRaft mode — no ZooKeeper)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gpay-kafka
    ports:
      - "19092:29092"
      - "19093:9093"
    environment:
      # KRaft mode
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - cdc-network

  # 9. Schema Registry (Avro)
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: gpay-schema-registry
    depends_on:
      - kafka
    ports:
      - "18081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xmx256m -Xms128m"
    networks:
      - cdc-network

  # 10. Kafka Connect + Debezium
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: gpay-kafka-connect
    depends_on:
      - kafka
      - schema-registry
      - mongodb
    ports:
      - "18083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: cdc-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_HEAP_OPTS: "-Xmx512m -Xms256m"
    command:
      - bash
      - -c
      - |
        # Install Debezium MongoDB connector
        confluent-hub install --no-prompt debezium/debezium-connector-mongodb:2.5.4
        # Start Connect
        /etc/confluent/docker/run
    networks:
      - cdc-network

  # 11b. Kafka Exporter (Phase 5 — consumer lag metrics for Prometheus)
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: gpay-kafka-exporter
    depends_on:
      - kafka
    command:
      - '--kafka.server=kafka:9092'
      - '--web.listen-address=:9308'
      - '--topic.filter=^cdc\..*'
      - '--group.filter=.*'
    ports:
      - "9308:9308"
    networks:
      - cdc-network
    restart: unless-stopped

  # 11. Redpanda Console (Kafka UI)
  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: gpay-redpanda-console
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "18088:8080"
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://schema-registry:8081
      CONNECT_ENABLED: "true"
      CONNECT_CLUSTERS_NAME: cdc-connect
      CONNECT_CLUSTERS_URL: http://kafka-connect:8083
    networks:
      - cdc-network

  # 12. Debezium Server (DEPRECATED — replaced by Kafka Connect)
  # Keeping for reference, container should be stopped
  # debezium:
  #   image: quay.io/debezium/server:2.5
  #   container_name: gpay-debezium

  # 13. CMS Service — tách riêng project: ../cdc-cms-service
  #    Xem ../cdc-cms-service/docker-compose.yml hoặc chạy:
  #    cd ../cdc-cms-service && docker compose up -d

volumes:
  mysql_data:
  mongo_data:
  postgres_data:
  kafka_data:

networks:
  cdc-network:
    driver: bridge
